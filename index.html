<!DOCTYPE html>

    <style>
      /* 加载遮罩层 */
      .loader-overlay {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: rgba(255, 255, 255, 0.9); /* 半透明白色背景 */
          display: flex;
          justify-content: center;
          align-items: center;
          z-index: 9999; /* 确保在最上层 */
          transition: opacity 0.3s ease-out; /* 隐藏时的淡出效果 */
      }

      /* 加载动画核心元素 */
      .loader {
          width: 60px;
          height: 60px;
          border-radius: 50%;
          position: relative;
          animation: rotate 1.2s linear infinite; /* 旋转动画 */
      }

      /* 圆环的渐变边框 */
      .loader::before {
          content: '';
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          border-radius: 50%;
          border: 4px solid transparent;
          border-top-color: #3498db; /* 蓝色 */
          border-right-color: #2ecc71; /* 绿色 */
          border-bottom-color: #e74c3c; /* 红色 */
          border-left-color: #f1c40f; /* 黄色 */
          animation: gradient 2s linear infinite; /* 渐变颜色流动 */
      }

      /* 旋转动画关键帧 */
      @keyframes rotate {
          from { transform: rotate(0deg); }
          to { transform: rotate(360deg); }
      }

      /* 边框颜色流动动画 */
      @keyframes gradient {
          0% { filter: hue-rotate(0deg); } /* 初始色调 */
          100% { filter: hue-rotate(360deg); } /* 360度色调循环 */
      }

      /* 页面内容（示例） */
      .content {
          padding: 20px;
          text-align: center;
          margin-top: 50px;
      }
  </style>
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" charset="utf-8" async="" src="https://cdn.jsdelivr.net/npm/live2d-widget@3.0.4/lib/L2Dwidget.min.js"></script> 
</head>

  <!-- 页面内容（加载完成后显示）
  <div class="content" id="pageContent" style="display: none;">
      <h1>页面加载完成！</h1>
      <p>这是页面的主要内容区域。</p>
  </div> -->

  <script>
      // 页面所有资源加载完成后隐藏加载动画
      window.addEventListener('load', function() {
          const loaderOverlay = document.getElementById('loaderOverlay');
          const pageContent = document.getElementById('pageContent');
          
          // 延迟 500ms 隐藏（可选，让动画完成一个周期）
          setTimeout(() => {
              loaderOverlay.style.opacity = '0';
              setTimeout(() => {
                  loaderOverlay.style.display = 'none';
                  pageContent.style.display = 'block';
              }, 300); // 匹配淡出过渡时间
          }, 500);
      });
  </script>
